<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>めいまねつーる Phase1</title><link rel="stylesheet" href="style.css"></head><body><header class="header"><h1>🍁 めいまねつーる</h1><div class="summary"><div class="summary-card"><span class="title">キャラ</span><span id="characterCount">0</span></div><div class="summary-card"><span class="title">完了</span><span id="completeCount">0</span></div><div class="summary-card"><span class="title">残り</span><span id="remainCount">0</span></div></div><input id="searchBox" type="text" autocomplete="off" placeholder="🔍 キャラ検索"></header><main><section id="characterList" class="card-list"></section></main><button id="addCharacterBtn" class="fab" type="button">＋</button><dialog id="characterDialog"><h2 id="dialogTitle">キャラクター追加</h2><div class="form"><label>キャラ名 *</label><input id="characterName" type="text" maxlength="20"><label>レベル *</label><input id="characterLevel" type="text" inputmode="numeric" maxlength="3"><label>前日終了EXP（任意）</label><input id="characterExp" type="number" inputmode="decimal" step="0.01"></div><div class="dialog-buttons"><button id="saveBtn" type="button">保存</button><button id="cancelBtn" type="button">キャンセル</button></div><button id="deleteBtn" class="delete-button" type="button">🗑 キャラ削除</button></dialog><script src="app.js"></script></body></html>
