<!DOCTYPE html><html lang='ja'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>めいまねつーる v0.2.0</title><link rel='stylesheet' href='style.css'></head><body>
<header><h1>🍁 めいまねつーる v0.2.0</h1><input id='search' placeholder='キャラ検索'></header>
<div id='stats'></div><div id='list'></div>
<button id='fab'>＋</button>
<dialog id='dlg'>
<h3 id='mode'>キャラクター</h3>
<label>キャラ名*</label><input id='name'>
<label>レベル*</label><input id='level' type='number' min='1'>
<label>前日終了EXP（任意）</label><input id='exp' type='number' min='0' max='99.99' step='0.01'>
<div class='row'>
<button id='save'>保存</button>
<button id='cancel'>キャンセル</button>
</div>
<button id='delete' class='danger'>🗑 キャラ削除</button>
</dialog>
<script src='app.js'></script></body></html>
